# ===========================================
# TimeTracker - Docker Compose
# ===========================================
# Für Self-Hosting mit PostgreSQL

version: "3.8"

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  db:
    image: postgres:16-alpine
    container_name: timetracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-timetracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-timetracker_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-timetracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-timetracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - timetracker-network

  # ==========================================
  # TimeTracker Application
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: timetracker-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-timetracker}:${POSTGRES_PASSWORD:-timetracker_secure_password}@db:5432/${POSTGRES_DB:-timetracker}?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-your-super-secret-key-min-32-chars-long}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      TZ: ${TZ:-Europe/Berlin}
    ports:
      - "3012:3000"
    networks:
      - timetracker-network

  # ==========================================
  # Database Migrations (einmalig)
  # ==========================================
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: timetracker-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-timetracker}:${POSTGRES_PASSWORD:-timetracker_secure_password}@db:5432/${POSTGRES_DB:-timetracker}?schema=public
    networks:
      - timetracker-network
    profiles:
      - setup

volumes:
  postgres_data:
    driver: local

networks:
  timetracker-network:
    driver: bridge
